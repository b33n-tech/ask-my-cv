<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Profil</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        #app { width: 100%; max-width: 600px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; color: #1a1a1a; font-size: 1.5em; }
        .subtitle { color: #555; margin-bottom: 20px; font-size: 0.95em; line-height: 1.5; }
        #chat-window { height: 400px; overflow-y: auto; border: 1px solid #e0e0e0; padding: 15px; margin-bottom: 15px; border-radius: 8px; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 85%; font-size: 0.95em; line-height: 1.4; }
        .user { background: #007bff; color: white; align-self: flex-end; }
        .bot { background: #e9ecef; color: #333; align-self: flex-start; }
        #input-area { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div id="app">
    <h1>Mon Profil</h1>
    <p class="subtitle">Vous avez des questions sur mon profil? Vous voulez savoir s'il peut y avoir un bon matching poste/profil? Entrez votre question ci-dessous !</p>
    
    <div id="chat-window"></div>
    
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Tapez votre question ici..." autocomplete="off">
        <button onclick="sendMessage()">Envoyer</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');

    // ATTENTION : Remplacez cette URL par l'URL de votre fonction Vercel déployée
    const API_URL = 'ask-my-cv.vercel.app/api/chat'; 

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        userInput.value = '';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await response.json();
            addMessage(data.reply, 'bot');
        } catch (error) {
            addMessage('Désolé, une erreur est survenue lors de la communication avec le serveur.', 'bot');
        }
    }

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.textContent = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    userInput.addEventListener('keypress', (e) => { 
        if (e.key === 'Enter') sendMessage(); 
    });
</script>
</body>
</html>
